name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy (strict)
        run: mypy
      - name: Pytest (every fixture reproduces its stored reference on this platform)
        run: pytest --cov=graphed_corpus --cov-branch --cov-report=term-missing

  # Free-threaded / bleeding-edge Pythons (plan A.5). Experimental: awkward/hist wheels may lag.
  test-experimental:
    name: test (experimental) py${{ matrix.python }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" && pytest -q

  docs:
    name: docs (sphinx -W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"
          sphinx-build -W -b html docs docs/_build/html
